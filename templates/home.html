<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FWI Prediction</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 420px;
            background: #fff;
            padding: 35px;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 8px rgba(79,172,254,0.4);
        }

        button {
            width: 100%;
            padding: 13px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-size: 17px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2b8ef7;
        }

        .result {
            margin-top: 25px;
            text-align: center;
            padding: 15px;
            background: #f4f4f4;
            border-radius: 8px;
            color: #333;
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 500px) {
            .container {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🔥 Forest Fire Weather Index Prediction</h1>

    <form action="{{ url_for('predict_datapoint') }}" method="post">

        <input type="text" name="Temperature" placeholder="🌡 Temperature" required>

        <input type="text" name="RH" placeholder="💧 Relative Humidity (RH)" required>

        <input type="text" name="Ws" placeholder="🌬 Wind Speed (Ws)" required>

        <input type="text" name="Rain" placeholder="🌧 Rain" required>

        <input type="text" name="FFMC" placeholder="🔥 FFMC" required>

        <input type="text" name="DMC" placeholder="🌿 DMC" required>

        <input type="text" name="ISI" placeholder="📈 ISI" required>

        <input type="text" name="Classes" placeholder="📊 Classes" required>

        <input type="text" name="Region" placeholder="📍 Region" required>

        <button type="submit">Predict FWI</button>

    </form>

    {% if result %}
    <div class="result">
        Predicted FWI: {{ result }}
    </div>
    {% endif %}

</div>

</body>
</html>
